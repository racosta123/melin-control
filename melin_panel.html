<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Melin Joyeros - Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-pagina: #f0f2f5;
            --bg-modulo: #32CD32;
            --texto-claro: #ffffff;
            --texto-oscuro: #1a1a1a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-pagina);
            color: var(--texto-oscuro);
            margin: 0;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* LOGIN */
        #login-screen {
            max-width: 360px;
            margin: 80px auto;
            background: #fff;
            border-radius: 28px;
            padding: 40px 36px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }
        #login-screen .lock { font-size: 3rem; margin-bottom: 16px; }
        #login-screen h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
        #login-screen p { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
        #pass-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1.5px solid #ddd;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 14px;
            outline: none;
        }
        #pass-input:focus { border-color: #32CD32; }
        #btn-login {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: #32CD32;
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        #btn-login:active { transform: scale(0.97); }
        .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: 10px; display: none; }

        /* PANEL */
        #main-screen { display: none; }
        .header { text-align: center; margin-bottom: 30px; padding-top: 10px; }
        .logo-container { width: 120px; margin: 0 auto 15px; }
        .logo-container img { width: 100%; height: auto; display: block; }
        h1 { font-size: 1.7rem; margin: 0; font-weight: 800; color: #000; letter-spacing: -1px; }
        .subtitle { font-size: 0.8rem; opacity: 0.6; margin-top: 5px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .modulo-card {
            background: var(--bg-modulo);
            padding: 22px;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(50, 205, 50, 0.2);
            color: var(--texto-claro);
        }
        .modulo-card h2 { font-weight: 700; font-size: 1.25rem; margin: 0 0 18px 0; }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.12);
            border-radius: 18px;
        }

        .control-label {
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* BOTÓN DE ACCIÓN */
        .btn-hold {
            position: relative;
            width: 64px;
            height: 36px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
            transition: transform 0.1s;
        }

        .btn-hold:active { transform: scale(0.95); }

        .btn-hold .label {
            position: relative;
            z-index: 2;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 4px;
        }

        /* Barra de progreso al mantener presionado */
        .btn-hold .progress {
            position: absolute;
            left: 0; top: 0;
            height: 100%;
            width: 0%;
            border-radius: 18px;
            transition: width linear;
            z-index: 1;
        }

        .btn-hold.azul { background: #1d6feb; }
        .btn-hold.azul .progress { background: #0a4fc4; }

        .btn-hold.rojo { background: #ef4444; }
        .btn-hold.rojo .progress { background: #b91c1c; }

        .btn-hold.exitoso { background: #16a34a !important; }
        .btn-hold.exitoso .progress { display: none; }

        .btn-hold.ocupado { opacity: 0.6; cursor: not-allowed; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: #fff;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 999;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; }
        #toast.ok { border-left: 4px solid #32CD32; }
        #toast.err { border-left: 4px solid #ef4444; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="lock">🔒</div>
        <h2>Melin Joyeros</h2>
        <p>Ingresa la contraseña para continuar</p>
        <input type="password" id="pass-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') verificar()">
        <button id="btn-login" onclick="verificar()">Entrar</button>
        <p class="error-msg" id="error-msg">❌ Contraseña incorrecta</p>
    </div>

    <!-- PANEL -->
    <div id="main-screen">
        <div class="header">
            <div class="logo-container">
                <img src="logo.png" alt="Melin Joyeros" onerror="this.src='https://via.placeholder.com/150x80?text=MELIN+JOYEROS'">
            </div>
            <h1>Melin Joyeros</h1>
            <p class="subtitle">Panel de Control de Seguridad</p>
        </div>
        <div class="dashboard-grid" id="grid"></div>
    </div>

    <div id="toast"></div>

<script>
    const PASSWORD = "volovan";
    const SERVER   = "https://shelly-29-eu.shelly.cloud";
    const AUTH_KEY = "N2NjYjZ1aWQ248EF3F5AB2D6D59C82574560A92572942C106E3AABA251C161B7E011FD902C25F433E0C78BEB22D";
    const HOLD_MS  = 3000; // milisegundos que hay que mantener presionado

    const sucursales = [
        { nombre: "Mc Saturnino",   id: "e8db84ab36b5" },
        { nombre: "Mc 626",         id: "e8db84acdc4c" },
        { nombre: "Mc Ley Sahuaro", id: "98cdac2d5e91" },
        { nombre: "Mc Andenes",     id: "e8db84ac4e34" },
        { nombre: "Mc Nogales",     id: "ecda3bc09bdc" },
        { nombre: "Mc Navojoa",     id: "30c9224c4300" },
        { nombre: "Festiboda",      id: "a0dd6c49797c", sinNiebla: true },
    ];

    function verificar() {
        const input = document.getElementById('pass-input').value;
        const errorMsg = document.getElementById('error-msg');
        if (input === PASSWORD) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            construirPanel();
        } else {
            errorMsg.style.display = 'block';
            document.getElementById('pass-input').value = '';
            setTimeout(() => errorMsg.style.display = 'none', 2500);
        }
    }

    let toastTimer;
    function mostrarToast(msg, tipo) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'show ' + tipo;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.className = '', 3000);
    }

    function feedback() {
        if ("vibrate" in navigator) navigator.vibrate(60);
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }

    async function llamarShelly(deviceId, accion) {
        const url = `${SERVER}/device/relay/control`;
        const body = new URLSearchParams({
            auth_key: AUTH_KEY,
            id: deviceId,
            channel: 0,
            turn: accion
        });
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: body.toString()
        });
        return await res.json();
    }

    function configurarBoton(btn, suc, tipo, seg) {
        let holdTimer = null;
        let progressTimer = null;
        let ocupado = false;

        function iniciarHold(e) {
            e.preventDefault();
            if (ocupado) return;

            const progress = btn.querySelector('.progress');
            const label = btn.querySelector('.label');

            progress.style.transition = `width ${HOLD_MS}ms linear`;
            progress.style.width = '100%';

            holdTimer = setTimeout(async () => {
                ocupado = true;
                btn.classList.add('ocupado');
                label.innerHTML = '⏳';
                feedback();

                if (tipo === 'n') {
                    const ok = confirm(`⚠️ MELIN JOYEROS:\n\n¿Activar niebla en ${suc.nombre}?`);
                    if (!ok) {
                        resetBtn();
                        return;
                    }
                }

                try {
                    const resp = await llamarShelly(suc.id, 'on');
                    if (resp.isok) {
                        btn.classList.remove('ocupado');
                        btn.classList.add('exitoso');
                        label.innerHTML = '✅';
                        feedback();
                        mostrarToast(`✓ ${suc.nombre} — ${tipo === 'p' ? 'Puerta abierta' : 'Niebla activada'}`, 'ok');

                        // Auto apagar después de los segundos configurados
                        setTimeout(async () => {
                            try { await llamarShelly(suc.id, 'off'); } catch(e) {}
                            resetBtn();
                        }, seg * 1000);

                    } else {
                        mostrarToast(`✗ Error en ${suc.nombre}`, 'err');
                        resetBtn();
                    }
                } catch(e) {
                    mostrarToast(`✗ Sin conexión — ${suc.nombre}`, 'err');
                    resetBtn();
                }
            }, HOLD_MS);
        }

        function cancelarHold() {
            if (holdTimer) {
                clearTimeout(holdTimer);
                holdTimer = null;
            }
            if (!ocupado) resetBtn();
        }

        function resetBtn() {
            ocupado = false;
            btn.classList.remove('ocupado', 'exitoso');
            const progress = btn.querySelector('.progress');
            const label = btn.querySelector('.label');
            progress.style.transition = 'none';
            progress.style.width = '0%';
            label.innerHTML = tipo === 'p' ? '🚪' : '💨';
        }

        btn.addEventListener('mousedown', iniciarHold);
        btn.addEventListener('touchstart', iniciarHold, { passive: false });
        btn.addEventListener('mouseup', cancelarHold);
        btn.addEventListener('mouseleave', cancelarHold);
        btn.addEventListener('touchend', cancelarHold);
        btn.addEventListener('touchcancel', cancelarHold);
    }

    function construirPanel() {
        const grid = document.getElementById('grid');
        sucursales.forEach(suc => {
            const card = document.createElement('div');
            card.className = 'modulo-card';

            let botonesHTML = `
                <div class="control-row">
                    <span class="control-label">🚪 Abrir Puerta</span>
                    <button class="btn-hold azul" id="btn-p-${suc.nombre}">
                        <div class="progress"></div>
                        <div class="label">🚪</div>
                    </button>
                </div>
            `;

            if (!suc.sinNiebla) {
                botonesHTML += `
                <div class="control-row">
                    <span class="control-label">💨 Activar Niebla</span>
                    <button class="btn-hold rojo" id="btn-n-${suc.nombre}">
                        <div class="progress"></div>
                        <div class="label">💨</div>
                    </button>
                </div>
                `;
            }

            card.innerHTML = `<h2>${suc.nombre}</h2>${botonesHTML}`;
            grid.appendChild(card);

            // Configurar eventos
            configurarBoton(document.getElementById(`btn-p-${suc.nombre}`), suc, 'p', 3);
            if (!suc.sinNiebla) {
                configurarBoton(document.getElementById(`btn-n-${suc.nombre}`), suc, 'n', 15);
            }
        });
    }
</script>
</body>
</html>
